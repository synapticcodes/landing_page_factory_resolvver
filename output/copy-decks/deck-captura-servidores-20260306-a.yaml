metadata:
  deck_id: "deck-captura-servidores-20260306-a"
  created_date: "2026-03-06"
  audience: "servidores_publicos"
  objective: "Gerar leads MQL qualificados de trafego frio (Meta Ads), filtrando curiosos e leads com salario abaixo de R$ 3.000"
  strategy_type: "captura"
  structure_model: "PAS"
  version: "1.0"

# ============================================================================
# BRIEF
# ============================================================================
brief:
  raw_input: |
    Preciso de uma pagina de captura fria para funcionarios publicos.
    Objetivo: Gerar leads qualificados e repelir curiosos ou pobres.
    O visitante vem de trafego pago do Meta Ads, ele nao conhece a
    Resolvver ainda, e um trafego frio, primeiro contato.
  interpreted_objective: |
    Pagina de captura cold-traffic para servidores publicos ativos,
    vindo de Meta Ads (primeiro contato com a Resolvver). O visitante
    nao conhece a empresa, esta entre Unaware e Problem-Aware. A pagina
    precisa: (1) construir confianca rapida, (2) qualificar por salario
    minimo R$ 3.000, (3) repelir curiosos com copy especifico que filtra
    por valor, (4) converter lead qualificado ao WhatsApp. Tom profissional,
    dados concretos, respeito a inteligencia do servidor.
  constraints:
    - "Trafego 100% frio — zero conhecimento previo da Resolvver"
    - "Meta Ads como fonte — visitante nao buscou ativamente"
    - "Filtrar leads com salario liquido abaixo de R$ 3.000"
    - "Repelir curiosos sem interesse real"

# ============================================================================
# ESTRATEGIA
# ============================================================================
strategy_selection:
  model: "PAS"
  rationale: |
    PAS (Problem > Agitate > Solution) e ideal para este cenario porque:
    1. Trafego frio de Meta Ads — visitante nao estava buscando solucao
    2. Servidores publicos respondem bem a dados concretos sobre o problema
    3. A agitacao com numeros financeiros reais ativa aversao a perda
    4. A solucao chega como alivio apos o visitante sentir o peso do problema
    5. PAS permite construir confianca durante a fase de "Solution" antes do form
    Alternativa descartada: AIDA (mais adequado para aposentados, pathway emocional)

  psychological_approach:
    awareness_level: "problem-aware (entre nivel 1 e 2 — sabe que parcela e alta, nao sabe que pode reduzir via Justica)"
    primary_triggers:
      - "autoridade — CNPJ, OAB, Google Reviews, dados verificaveis"
      - "aversao_perda — frame financeiro: quanto perde por mes em juros"
      - "compromisso_progressivo — micro-commits ate o formulario"
    cognitive_biases:
      - "ancoragem — parcela atual como ancora, depois mostrar parcela reduzida"
      - "aversao_perda — 'voce esta perdendo R$ X por mes em juros'"
      - "efeito_enquadramento — 3 frames: mensal, anual, percentual"
      - "status_quo — reduzir friccao de mudar (processo 100% digital)"
    emotional_journey: "desconfianca/ceticismo > curiosidade (dados) > conviccao (prova social + autoridade) > acao (formulario)"

  assets_selected:
    copywriting_frameworks:
      - "headlines/formulas.yaml > pas_formula (Problem > Agitate > Solution)"
      - "headlines/formulas.yaml > number_statistics_headlines (ancoragem numerica)"
      - "ctas/frameworks.yaml > formula_1_verb_plus_benefit"
      - "ctas/progressao_compromisso.yaml > foot_in_the_door"
      - "psicologia/gatilhos_emocionais.yaml > aversao_perda + autoridade"
      - "psicologia/vieses_cognitivos.yaml > ancoragem + framing_effect"
      - "prova_social/hierarquia_confianca.yaml > trust_pyramid"
      - "quebra_objecoes/taxonomia.yaml > trust_objections + risk_objections + process_objections"
      - "communication/servidores_publicos.yaml > tom profissional"
    references_consulted:
      - "psicologia/niveis_consciencia.yaml > nivel_1 + nivel_2"
      - "estrutura_lp/modelos.yaml > pas"
      - "creative-matrix.yaml > captura_fria"
    visual_assets:
      - "assets/pessoas/genericas/funcionarios_publicos/medo_funcionarios_publicos_3.webp"
      - "assets/pessoas/genericas/funcionarios_publicos/controle_funcionarios_publicos_2.webp"
      - "assets/pessoas/genericas/funcionarios_publicos/felicidade_funcionarios_publicos_4.webp"
      - "assets/pessoas/genericas/funcionarios_publicos/alivio_funcionarios_publicos_5.webp"
      - "assets/brand/logo/logo-transparente.png"
      - "assets/brand/logo/logo-branco.png"
      - "assets/pessoas/depoimentos/_manifest.yaml > servidores (geolocalizados)"

# ============================================================================
# SECOES (ordem = ordem na pagina)
# ============================================================================
sections:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. HERO — Problem (PAS fase 1)
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "hero"
    component_type: "hero"
    purpose: "Capturar atencao em 3s nomeando o problema financeiro do servidor. Ativar reconhecimento: 'isso sou eu'. Ancoragem na parcela atual."
    annotations:
      - "Visitante chega frio de Meta Ads. Primeira impressao critica — 3 segundos."
      - "Tom profissional, dados concretos. NAO ser alarmista."
      - "Microproof acima do fold para construir confianca minima."
      - "CTA acima do fold — micro-compromisso (scroll to form)."
      - "Imagem generica de medo/preocupacao alinhada ao tom do problema."
    copy:
      headline:
        text: "Servidores publicos perdem ate R$ 900 por mes em juros de consignado"
        framework: "PAS — Problem statement + Number Statistics"
        trigger: "aversao_perda + ancoragem"
        variants:
          - "Seu contracheque esta comprometido com parcelas que podem ser reduzidas"
          - "Quanto do seu salario vai para juros que voce nao precisava pagar?"
      subheadline:
        text: "A Resolvver usa medidas judiciais para reduzir suas parcelas em ate 75%. Processo 100% digital, de qualquer lugar do Brasil."
        framework: "Beneficio concreto + quebra objecao geografica (R11)"
      cta:
        text: "Quero reduzir minhas parcelas"
        action: "scroll_to:form"
        style: "primary"
        framework: "Primeira pessoa + beneficio (foot_in_the_door)"
        variants:
          - "Calcule sua economia agora"
          - "Verificar minha reducao"
      microproof: "4.8 no Google | CNPJ 64.933.842/0001-89 | Atuacao em todo o Brasil"
    visual_intent:
      background_mood: "Profissional, serio, fundo escuro com contraste no valor financeiro"
      layout_hint: "split_image_text — headline a esquerda, imagem de servidor preocupado a direita"
      emphasis: "Valor R$ 900 em destaque (cor diferente), CTA grande e claro"
      assets_to_use:
        - "assets/pessoas/genericas/funcionarios_publicos/medo_funcionarios_publicos_3.webp"
        - "assets/brand/logo/logo-branco.png"
    tracking_events:
      - event_name: "hero_view"
        trigger: "page_load"
      - event_name: "hero_cta_click"
        trigger: "click"
        target: "cta_hero"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. LEGITIMIDADE — Trust (construir confianca antes de aprofundar)
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "legitimidade"
    component_type: "legitimidade"
    purpose: "Construir confianca institucional rapida. Visitante frio precisa saber que a empresa e real antes de continuar lendo. Base da piramide de confianca."
    annotations:
      - "Servidores verificam credenciais. Todos os dados devem ser clicaveis/verificaveis."
      - "Trust badges em grid horizontal. Compacto, profissional."
      - "NAO exagerar — 4-5 elementos maximos, sem poluir."
    copy:
      headline:
        text: "Por que servidores confiam na Resolvver"
        framework: "Prova social + autoridade"
        trigger: "autoridade"
        variants:
          - "Credenciais verificaveis — confira voce mesmo"
      elements:
        - type: "trust_card"
          data:
            icon: "Shield"
            title: "Empresa registrada"
            description: "CNPJ 64.933.842/0001-89 — consulte na Receita Federal"
        - type: "trust_card"
          data:
            icon: "Star"
            title: "4.8 no Google"
            description: "Mais de 1.200 avaliacoes reais de clientes"
        - type: "trust_card"
          data:
            icon: "Scale"
            title: "Advogados inscritos na OAB"
            description: "Equipe juridica especializada em consignado"
        - type: "trust_card"
          data:
            icon: "MapPin"
            title: "Atuacao em todo o Brasil"
            description: "Processo 100% digital — nao importa onde voce mora"
        - type: "trust_card"
          data:
            icon: "CheckCircle"
            title: "Voce so paga se funcionar"
            description: "Sem reducao, sem custo. O risco e todo nosso."
    visual_intent:
      background_mood: "Claro, limpo, profissional — fundo branco ou cinza muito claro"
      layout_hint: "cards_grid — 5 cards em linha (desktop), 2 colunas (mobile)"
      emphasis: "Icones e titulos dos cards"
    tracking_events:
      - event_name: "trust_section_view"
        trigger: "scroll_into_view"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. AGITACAO — Aprofundar o problema com dados (PAS fase 2)
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "agitacao"
    component_type: "custom"
    purpose: "Desanestesiar a perda financeira. Servidor esta acostumado a pagar parcelas altas — mostrar quanto PERDE por ano ativa aversao a perda. Tres frames: mensal, anual, percentual."
    annotations:
      - "Secao critica — ativa motivacao via loss framing."
      - "Usar ancoragem: valor ANTES (ancora alta) vs valor DEPOIS."
      - "Servidores processam multiplos frames — mostrar mensal + anual + percentual."
      - "Exemplo financeiro segue regra 75%: R$ 1.200 x 0.25 = R$ 300."
      - "NAO inventar valores — todos calculados pela regra."
      - "Tom: dados concretos, nao alarmista. Respeitar inteligencia."
    copy:
      headline:
        text: "Quanto voce esta perdendo em juros todo mes?"
        framework: "PAS — Agitation via question + aversao_perda"
        trigger: "aversao_perda + ancoragem"
        variants:
          - "Faca as contas: seu consignado custa mais do que deveria"
      body: |
        Um servidor com parcela de R$ 1.200 por mes pode estar pagando
        ate R$ 900 so em juros. Com a revisao judicial, essa parcela
        pode cair para R$ 300 — uma economia de R$ 900 por mes.
      elements:
        - type: "comparison_card"
          data:
            before_label: "Parcela atual"
            before_value: "R$ 1.200/mes"
            after_label: "Parcela revisada"
            after_value: "R$ 300/mes"
            savings_label: "Voce deixa de perder"
            savings_value: "R$ 900/mes"
            note: "Reducao de 75% — regra fixa aplicada via medida judicial"
        - type: "frame_cards"
          data:
            frames:
              - label: "Por mes"
                value: "R$ 900"
                description: "que voltam para o seu bolso"
              - label: "Por ano"
                value: "R$ 10.800"
                description: "que voce deixa de perder"
              - label: "Reducao"
                value: "75%"
                description: "da parcela via medida judicial"
      cta:
        text: "Verificar minha economia"
        action: "scroll_to:form"
        style: "secondary"
        framework: "Verbo + beneficio (micro-compromisso)"
        variants:
          - "Quero saber quanto perco"
    visual_intent:
      background_mood: "Serio, escuro — fundo navy/dark para destacar numeros financeiros"
      layout_hint: "centered — comparison card grande no centro, frame cards abaixo em grid 3 colunas"
      emphasis: "Valor R$ 900/mes em destaque (cor verde ou brand-green), valor antes riscado"
    tracking_events:
      - event_name: "agitation_section_view"
        trigger: "scroll_into_view"
      - event_name: "agitation_cta_click"
        trigger: "click"
        target: "cta_agitacao"

  # ──────────────────────────────────────────────────────────────────────────
  # 4. PROCESSO — Solution (PAS fase 3)
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "processo"
    component_type: "processo"
    purpose: "Mostrar o caminho da solucao. Reduzir friccao de mudar (combater status quo bias). Demonstrar simplicidade e transparencia do processo."
    annotations:
      - "Maximo 4 passos para servidores (creative-matrix)."
      - "Enfatizar que e 100% digital — servidor nao precisa ir a lugar nenhum."
      - "Mencionar app de acompanhamento no ultimo passo (S6)."
      - "Tom: eficiente, direto, sem enrolacao."
    copy:
      headline:
        text: "Como funciona: 4 etapas, tudo digital"
        framework: "How-to + simplificacao do processo"
        trigger: "reducao de friccao (status quo bias)"
        variants:
          - "Processo simples em 4 passos — sem sair de casa"
      elements:
        - type: "step"
          data:
            number: 1
            icon: "ClipboardList"
            title: "Preencha o formulario"
            description: "Seus dados basicos e valor do salario liquido. Leva 2 minutos."
        - type: "step"
          data:
            number: 2
            icon: "Search"
            title: "Analise da equipe juridica"
            description: "Nossos advogados analisam seu caso em ate 48 horas e informam a economia estimada."
        - type: "step"
          data:
            number: 3
            icon: "Scale"
            title: "Medida judicial protocolada"
            description: "Entramos com o pedido na Justica. Voce assina digitalmente — sem cartorio, sem banco."
        - type: "step"
          data:
            number: 4
            icon: "TrendingDown"
            title: "Parcela reduzida"
            description: "Acompanhe cada etapa pelo WhatsApp e pelo nosso aplicativo no celular. A reducao e aplicada direto na sua folha."
    visual_intent:
      background_mood: "Claro, limpo, organizado — sensacao de eficiencia"
      layout_hint: "horizontal_steps — timeline com 4 passos, icones grandes, numeracao clara"
      emphasis: "Icones e titulos dos passos. Ultimo passo com destaque especial (resultado)."
      assets_to_use:
        - "assets/pessoas/genericas/funcionarios_publicos/controle_funcionarios_publicos_2.webp"
    tracking_events:
      - event_name: "process_section_view"
        trigger: "scroll_into_view"

  # ──────────────────────────────────────────────────────────────────────────
  # 5. PROVA SOCIAL — Depoimentos geolocalizados
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "prova_social"
    component_type: "prova_social"
    purpose: "Validacao por pares — servidores confiam em colegas de cargo similar. Depoimentos geolocalizados criam identificacao imediata."
    annotations:
      - "Depoimentos vem EXCLUSIVAMENTE do _manifest.yaml > servidores."
      - "Geolocalizacao via IPData: mostrar cidade do VISITANTE, nao da foto."
      - "Alternancia de genero obrigatoria: M > F > M."
      - "3 depoimentos por pagina."
      - "Filtrar: aprovado=true, texto nao vazio."
      - "Cargo visivel no card (diferencial para servidores)."
      - "Reforco indireto de atuacao nacional (R11): visitante ve gente da sua regiao."
    copy:
      headline:
        text: "Servidores de todo o Brasil ja reduziram suas parcelas"
        framework: "Prova social segmentada + atuacao nacional (R11)"
        trigger: "prova_social + autoridade de pares"
        variants:
          - "Veja o que outros servidores publicos estao dizendo"
      subheadline:
        text: "Historias reais de quem tomou a decisao de parar de pagar juros desnecessarios."
        framework: "Aversao a perda (frame: parar de pagar)"
      elements:
        - type: "testimonial_config"
          data:
            source: "_manifest.yaml > servidores"
            quantity: 3
            selection_criteria: "aprovado: true AND texto nao vazio"
            geolocation: true
            geolocation_rule: "IPData > UF > regiao > fotos da regiao. Cidade exibida = cidade do visitante."
            gender_alternation: "M > F > M"
            display_fields: ["foto", "nome", "cargo", "cidade_visitante", "estrelas", "texto"]
            fallback: "Regiao vizinha > avatar CSS com iniciais"
    visual_intent:
      background_mood: "Claro, caloroso — fundo suave para depoimentos"
      layout_hint: "cards_grid — 3 cards lado a lado (desktop), stack vertical (mobile)"
      emphasis: "Nome + cargo + estrelas. Texto do depoimento em destaque."
      assets_to_use:
        - "assets/pessoas/genericas/funcionarios_publicos/felicidade_funcionarios_publicos_4.webp"
    tracking_events:
      - event_name: "social_proof_view"
        trigger: "scroll_into_view"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. TRANSPARENCIA — Custos e garantias
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "transparencia"
    component_type: "transparencia"
    purpose: "Antecipar objecao de custo (objection_4a, 4b, 4c). Servidor quer ROI claro e transparencia total. Risk-reversal forte."
    annotations:
      - "Servidores negociam agressivamente (gratuity_rules). Mostrar ROI."
      - "NAO usar palavras proibidas: 'sem custo', 'analise gratuita', etc."
      - "Risk-reversal em destaque: voce paga apenas se conseguirmos reducao."
      - "Comparar: economia vs honorarios para que servidor calcule ROI."
    copy:
      headline:
        text: "Transparencia total: como funciona o investimento"
        framework: "Quebra de objecao > Price Transparency + Risk-Reversal"
        trigger: "autoridade + confianca"
        variants:
          - "Sem surpresas: veja exatamente como funciona"
      body: |
        A Resolvver cobra honorarios apenas APOS conseguir a reducao
        da sua parcela e protocolar na Justica. Se nao conseguirmos
        reducao, voce nao paga nada. Simples assim.
      elements:
        - type: "guarantee_card"
          data:
            icon: "ShieldCheck"
            title: "Voce so paga se funcionar"
            description: "Sem reducao protocolada = zero custo para voce. O risco e 100% nosso."
        - type: "roi_example"
          data:
            description: "Exemplo: servidor com parcela de R$ 1.200/mes"
            economia_mensal: "R$ 900"
            economia_anual: "R$ 10.800"
            nota: "Mesmo com os honorarios, sua economia liquida e significativa. Os numeros falam por si."
    visual_intent:
      background_mood: "Neutro, limpo, confiavel — sem cores agressivas"
      layout_hint: "split — guarantee card a esquerda, ROI example a direita"
      emphasis: "Frase 'voce so paga se funcionar' em destaque"
    tracking_events:
      - event_name: "transparency_view"
        trigger: "scroll_into_view"

  # ──────────────────────────────────────────────────────────────────────────
  # 7. FAQ
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "faq"
    component_type: "faq"
    purpose: "Responder objecoes finais antes do formulario. Remover ultimas barreiras de conversao. Servidores querem respostas tecnicas e diretas."
    annotations:
      - "Maximo 7 itens (communication guidelines servidores)."
      - "Perguntas priorizadas pela taxonomia de objecoes."
      - "Mencionar app de acompanhamento em pergunta sobre prazo (S6)."
      - "Tom direto, respostas curtas, sem enrolacao."
    copy:
      headline:
        text: "Duvidas frequentes de servidores publicos"
        framework: "FAQ segmentado por audiencia"
        trigger: "autoridade + transparencia"
        variants:
          - "Perguntas que servidores fazem antes de comecar"
      elements:
        - type: "faq_item"
          data:
            question: "Como funciona a reducao de consignado?"
            answer: "A Resolvver entra com uma medida judicial para revisar os juros do seu consignado. A reducao e aplicada diretamente no desconto em folha, sem necessidade de negociacao com o banco."
        - type: "faq_item"
          data:
            question: "Quanto custa?"
            answer: "Voce paga honorarios apenas APOS a reducao ser protocolada na Justica. Se nao conseguirmos reducao, voce nao paga nada. Os valores sao apresentados com total transparencia antes de qualquer assinatura."
        - type: "faq_item"
          data:
            question: "Quanto tempo leva o processo?"
            answer: "A analise inicial leva 24 a 48 horas. O protocolo judicial e feito em ate 72 horas apos a analise. Voce acompanha cada etapa em tempo real pelo WhatsApp e pelo nosso aplicativo disponivel para iOS e Android."
        - type: "faq_item"
          data:
            question: "Preciso trocar de banco?"
            answer: "Nao. A reducao e feita via Justica, independente do banco. Seu relacionamento bancario continua exatamente como esta."
        - type: "faq_item"
          data:
            question: "Meu orgao permite isso?"
            answer: "Sim. A revisao judicial de consignado e um direito de todo servidor publico, independente da esfera (federal, estadual ou municipal). Nao depende de autorizacao do orgao."
        - type: "faq_item"
          data:
            question: "E seguro? Meu nome fica negativado?"
            answer: "Totalmente seguro. Uma revisao de parcela pela Justica nao gera qualquer restricao ao seu nome. E um direito, nao uma divida. Seus dados sao protegidos pela LGPD."
        - type: "faq_item"
          data:
            question: "Posso fazer tudo online?"
            answer: "Sim. O processo e 100% digital: formulario, analise, assinatura eletronica e acompanhamento. Voce nao precisa ir a banco, cartorio ou qualquer outro lugar. Atendemos servidores de todos os estados."
    visual_intent:
      background_mood: "Claro, organizado — accordion style"
      layout_hint: "accordion — perguntas colapsaveis, uma aberta por vez"
      emphasis: "Perguntas em bold, respostas em texto regular"
    tracking_events:
      - event_name: "faq_view"
        trigger: "scroll_into_view"
      - event_name: "faq_item_click"
        trigger: "click"
        target: "faq_accordion_item"

  # ──────────────────────────────────────────────────────────────────────────
  # 8. FORMULARIO — Conversao
  # ──────────────────────────────────────────────────────────────────────────
  - section_id: "form"
    component_type: "form"
    purpose: "Converter lead qualificado. Formulario apos construcao de confianca, processo, prova social e FAQ. Lead chega aqui convicto."
    annotations:
      - "Maximo 5 campos para servidores (name, whatsapp, email, valor_liquido, cargo)."
      - "Campo de telefone SEMPRE com label 'WhatsApp' (R4.1)."
      - "Campo cargo e texto aberto, SEM campo orgao (R4.1)."
      - "Autocomplete hardcoded: name=name, whatsapp=tel, email=email."
      - "Qualificacao por valor_liquido >= R$ 3.000."
      - "Microcopy de seguranca e WhatsApp abaixo do botao."
      - "Imagem de alivio ao lado do formulario (split layout)."
    copy:
      headline:
        text: "Descubra quanto voce pode economizar"
        framework: "Verbo + beneficio (CTA headline)"
        trigger: "curiosidade + compromisso_progressivo"
        variants:
          - "Preencha e receba sua analise em ate 48 horas"
      subheadline:
        text: "Preencha os campos abaixo. Retorno pelo WhatsApp em ate 15 minutos durante horario comercial."
        framework: "Expectativa clara + canal de contato"
      cta:
        text: "Quero minha analise"
        action: "submit"
        style: "primary"
        framework: "Primeira pessoa + beneficio"
        variants:
          - "Enviar para analise"
          - "Solicitar reducao"
    visual_intent:
      background_mood: "Claro, acolhedor, formulario em destaque com fundo branco e sombra"
      layout_hint: "split_image_text — formulario a esquerda, imagem de servidor aliviado a direita"
      emphasis: "Campos e botao CTA. Microcopy de seguranca visivel."
      assets_to_use:
        - "assets/pessoas/genericas/funcionarios_publicos/alivio_funcionarios_publicos_5.webp"
    tracking_events:
      - event_name: "form_view"
        trigger: "scroll_into_view"
      - event_name: "form_start"
        trigger: "focus"
        target: "first_field"
      - event_name: "form_submit"
        trigger: "submit"
      - event_name: "form_error"
        trigger: "validation_error"

# ============================================================================
# CONVERSAO
# ============================================================================
conversion:
  form:
    fields:
      - name: "name"
        label: "Nome completo"
        type: "text"
        required: true
        placeholder: "Joao da Silva"
        autocomplete: "name"
        validation_message: "Por favor, digite seu nome completo"
      - name: "whatsapp"
        label: "WhatsApp"
        type: "tel"
        required: true
        placeholder: "(11) 99999-9999"
        autocomplete: "tel"
        validation_message: "Informe um telefone valido que possua WhatsApp"
      - name: "email"
        label: "Seu e-mail"
        type: "email"
        required: true
        placeholder: "joao@email.com"
        autocomplete: "email"
        validation_message: "Verifique o e-mail. Exemplo: joao@email.com"
      - name: "valor_liquido"
        label: "Valor liquido do seu salario (R$)"
        type: "currency"
        required: true
        placeholder: "R$ 5.000"
        validation_message: "Por favor, digite o valor liquido do seu salario"
      - name: "cargo"
        label: "Cargo"
        type: "text"
        required: true
        placeholder: "Ex: professor estadual, enfermeiro, auditor fiscal"
        validation_message: "Por favor, informe seu cargo"
    cta_text: "Quero minha analise"
    security_microcopy: "Seus dados estao protegidos pela LGPD"
    whatsapp_microcopy: "Retorno pelo WhatsApp em ate 15 minutos (horario comercial)"
    no_commitment_microcopy: "Enviar nao gera compromisso — voce decide se quer prosseguir"

  qualification:
    enabled: true
    field: "valor_liquido"
    min_value: 3000
    disqualification_copy: |
      Agradecemos seu interesse. No momento, nossa solucao atende
      servidores com salario liquido a partir de R$ 3.000. Se sua
      situacao mudar no futuro, estaremos aqui para ajudar.
      Desejamos tudo de melhor para voce.

  whatsapp:
    message_template: |
      Ola, equipe Resolvver! Meu nome e {first_name}, sou {cargo} e recebo salario liquido de R$ {valor_liquido}. Preenchi o formulario na pagina de servidores publicos e gostaria de saber como reduzir minhas parcelas de consignado. Aguardo o contato de voces.
    transition_copy:
      headline: "Estamos preparando seu atendimento, {first_name}"
      subheadline: "Voce sera redirecionado ao WhatsApp para conversar com um especialista da equipe Resolvver."
      countdown_text: "Redirecionando em {seconds} segundos..."
      fallback_button: "Ir para o WhatsApp agora"

