# ============================================================================
# VARIÁVEIS DE AMBIENTE GLOBAIS — Replicadas em TODAS as páginas geradas
# ============================================================================
# O Coder DEVE criar um arquivo .env em cada projeto gerado contendo
# todas as variáveis listadas aqui. Nenhuma variável deve ser omitida.
#
# Estas variáveis são SECRETAS e NÃO devem ser commitadas em repositórios
# públicos. O Coder também deve gerar um .env.example com as chaves
# vazias para referência.
# ============================================================================

metadata:
  version: "1.0"
  updated: "2026-03-05"
  purpose: "Variáveis de ambiente compartilhadas entre todas as landing pages"

# ============================================================================
# GEOLOCALIZAÇÃO — IPData
# ============================================================================
ipdata:
  variable_name: "IPDATA_API_KEY"
  value: "5cb889f4e71af5b045a19a0d7ba8135ed3640052f578454f514cfc52"
  usage: |
    Geolocalização do visitante para personalizar depoimentos por região.
    Chamada server-side (Astro SSR): api.ipdata.co/?api-key={IPDATA_API_KEY}&fields=region_code,city
  limite: "1500 requisições/dia"
  nota: "Chamada SEMPRE server-side. NUNCA expor a chave no client-side."

# ============================================================================
# TEMPLATE .env (o Coder gera este arquivo em cada projeto)
# ============================================================================
env_template: |
  # ============================================
  # Landing Page — Variáveis de Ambiente
  # ============================================
  # Gerado pela Landing Page Factory
  # NÃO commitar em repositórios públicos
  # ============================================

  # Geolocalização (IPData) — usado para personalizar depoimentos por região
  IPDATA_API_KEY=5cb889f4e71af5b045a19a0d7ba8135ed3640052f578454f514cfc52

# ============================================================================
# TEMPLATE .env.example (commitável, sem valores sensíveis)
# ============================================================================
env_example_template: |
  # ============================================
  # Landing Page — Variáveis de Ambiente
  # ============================================
  # Copie este arquivo para .env e preencha os valores
  # ============================================

  # Geolocalização (IPData) — usado para personalizar depoimentos por região
  IPDATA_API_KEY=

