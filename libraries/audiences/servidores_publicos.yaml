# --- MERCADO ---
market:
  total_portfolio: "R$ 379 bilhões (54,8% da carteira nacional)"
  total_servants: "12,4 milhões de vínculos"
  endividados: "70% (maior que média nacional de 58%)"
  salary_premium: "40% acima da iniciativa privada"
  interest_rate: "1,36% a 6,84%/mês (média ~1,81% para federais)"
  max_term: "96 meses"
  margin:
    federal: "45% (35% empréstimo + 5% cartão + 5% benefício)"
    estadual: "Varia por estado (35-45%)"
