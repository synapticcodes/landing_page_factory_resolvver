    Não funciona: informalidade, urgência, promessas, falta de identificação.

# --- JORNADA ---
decision_journey:
  cycle: "2 a 8 semanas"
  stages:
    - stage: "Descoberta (semana 1-2)"
      behavior: "Vê anúncio 3-5x antes de clicar. Escaneia página em 10s buscando legitimidade."
    - stage: "Consulta familiar (semana 2-4)"
      behavior: "Filho pesquisa Google, Reclame AQUI, CNPJ. Processo morre se encontra problemas."
    - stage: "Negociação (semana 4-6)"
      behavior: "Quer pessoa REAL. Perguntas repetitivas. Paciência e repetição."
    - stage: "Decisão (semana 6-8)"
      behavior: "Precisa validação externa: filho ou vizinho confirmando."

  conversion_killers:
    critical:
      - "'Será que é golpe?' — qualquer elemento de fraude = abandono DEFINITIVO"
      - "'Vou ter que pagar?' — custo revelado depois = reação emocional intensa"
    high:
      - "'Preciso falar com meu filho' — família como filtro"
      - "Formulários longos — cada campo adicional = abandono exponencial"
      - "Custos inesperados — IOF, taxas descobertas = associação com fraude"
      - "Ausência de atendimento humano — chatbots afastam DEFINITIVAMENTE"

# --- CONFIANÇA ---
trust_factors:
  hierarchy:
    - rank: 1
      factor: "Indicação pessoal"
      why: "'Meu vizinho conseguiu' supera qualquer argumento técnico"
    - rank: 2
      factor: "CNPJ verificável + endereço físico"
      why: "Empresa 'de verdade', não só um site"
    - rank: 3
      factor: "Google Avaliações > 4★"
      why: "88% descartam abaixo de 4. Primeira consulta do filho."
    - rank: 4
      factor: "Reclame AQUI respondido"
      why: "Reclamação resolvida = empresa séria"
    - rank: 5
      factor: "Atendimento humano"
      why: "Pessoa real = segurança"

