# --- VIESES COGNITIVOS ---
cognitive_biases:
  - name: "Ancoragem na parcela"
    relevance: "MÁXIMA"
    description: "Parcela cai de X para Y → cérebro processa 'sobra Z a mais'. Nunca usar percentual."
  - name: "Aversão à perda (anestesiada)"
    relevance: "ALTA"
    description: "Dor da perda 2x prazer do ganho, mas desconto automático cria anestesia. Precisa 'desanestesiar'."
  - name: "Status quo"
    relevance: "ALTA"
    description: "'Deixa como está' — mostrar que inação também tem custo."
  - name: "Custo afundado"
    relevance: "MÉDIA-ALTA"
    description: "'Já paguei 48 parcelas, não posso desistir' — NUNCA implicar que errou."
  - name: "Viés do presente"
    relevance: "ALTA"
    description: "Parcela menor AGORA é infinitamente mais atraente que custo total. Sempre comunicar em termos mensais."
  - name: "Efeito preço zero"
    relevance: "CRÍTICA"
    description: "Interpreta consulta/análise/simulação como gratuitas. NUNCA insinuar gratuidade."

# --- FAMÍLIA ---
family_dynamics:
  role: "43% são principais responsáveis pelo sustento da casa"
  as_cause: "26% fizeram empréstimo para emprestar a terceiros (17% para filhos)"
  as_filter: |
    Filhos adultos participam da decisão, pesquisam Google/CNPJ/Reclame AQUI.
    Comunicação precisa convencer em DUAS CAMADAS: simples para aposentado, crível para filho.
  main_objection: "'Preciso falar com meu filho/esposa'"
  conjugal_impact: "62% relatam impacto no relacionamento"

