# ============================================================
# ESTRATÉGIA INTEGRADA: JORNADA COMPLETA
# ============================================================

integrated_strategy:
  summary: |
    Cliente entra em Nível 1 (não sabe nada).
    Precisa ser movido através de 5 níveis.
    Cada nível tem copy, tone, estrutura, gatilho DIFERENTES.
    Atacar com Nível 5 copy em Nível 1 = 0% conversão (confunde e afasta).
    Atacar com Nível 1 copy em Nível 5 = perder venda (burocrático demais).

  key_principle: |
    DETERMINE o nível do visitante (comportamento, fonte, histórico).
    APLIQUE copy específica para aquele nível.
    MOVE para próximo nível no email/página seguinte.
    NÃO pule níveis (Nível 2 → Nível 4 = perda).

  level_detection:
    how_to_identify:
      - "Primeira visita + nenhuma ação anterior? Nível 1"
      - "Pesquisa Google + visitou 2-3 sites? Nível 2"
      - "Segunda visita + abriu FAQ? Nível 3"
      - "Fez simulação + abriu página de checkout? Nível 4"
      - "Email de follow-up com simulação salva? Nível 5"

  email_sequence_alignment:
    email_1_dias_1_3: "Nível 1-2 copy (educação + prova de legitimidade)"
    email_2_dias_4_7: "Nível 2-3 copy (validação + comparação com concorrência)"
    email_3_dias_8_14: "Nível 3-4 copy (segurança + garantia)"
    email_4_dias_15_21: "Nível 4-5 copy (urgência legítima + agendamento)"
    email_5_dias_22_28: "Nível 5 copy (último empurrão, contador de juros)"

  page_optimization_by_source:
    source_facebook_cold:
      visitor_level: "Nível 1"
      landing_page_format: "Longa, educativa, múltiplos testemunhos"
      headline: "Você pode estar perdendo R$300/mês"
      cta: "Descobrir se você qualifica"

    source_google_search:
      visitor_level: "Nível 2"
      landing_page_format: "Média, validação + prova + comparação"
      headline: "Redução de consignado é real — aqui está como"
      cta: "Verificar se você qualifica"

    source_remarketing:
      visitor_level: "Nível 3-4"
      landing_page_format: "Curta, direto, urgência legítima"
      headline: "Você calculou. Agora execute."
      cta: "Agendar consultoria"

    source_email_follow_up:
      visitor_level: "Nível 4-5"
      landing_page_format: "Ultra-curta, botão gigante, contador de juros"
      headline: "Seu agendamento está sendo criado"
      cta: "AGENDAR CONSULTORIA AGORA"
