# Strategy: Quiz
metadata:
  strategy_id: quiz
  version: "1.0"
  source: "war_room/estrategias/quiz/"

description: |
  Estratégia de captura via quiz interativo.
  Fluxo: Hero → Legitimidade → Quiz (4-5 steps) → Resultado + Form → Prova Social → FAQ → Footer
  Lead responde quiz de diagnóstico, recebe economia estimada, preenche formulário,
  é qualificado, e redirecionado ao WhatsApp.

section_order:
  aposentados: ["hero", "legitimidade", "quiz", "resultado", "prova_social", "faq", "footer"]
  servidores: ["hero", "legitimidade", "quiz", "resultado", "prova_social", "faq", "footer"]

quiz_config:
  aposentados:
    total_steps: 4
    auto_advance: true
    advance_delay_ms: 400
    progress_bar: true
    progress_bar_height: "4px"
    progress_bar_color: "#1DB387"
    flow: "linear"

  servidores:
    total_steps: 5
    auto_advance: true
    advance_delay_ms: 400
    progress_bar: true
    progress_bar_height: "4px"
    progress_bar_color: "#1DB387"
    flow: "linear"

form_placement: "after_result (embedded in result section)"

qualification:
  aposentados:
    field: "valor_liquido"
    min_value: 2000
  servidores:
    field: "valor_liquido"
    min_value: 3000

post_submit:
  qualified:
    action: "loading_screen"
    loading_duration_ms: 2500
    loading_messages:
      - "Analisando suas respostas..."
      - "Calculando economia estimada..."
      - "Preparando seu resultado..."
    then: "transition_screen"
    countdown_seconds: 5
    redirect_method: "location.assign"
    fallback_button: "ABRIR WHATSAPP AGORA"

whatsapp:
  # Número do WhatsApp é configurado no Wolfgang Tracking (NÃO hardcodar nos configs)
  message_template:
    aposentados: "Olá! Sou aposentado(a), me chamo {{nome}}. Tenho interesse em reduzir minhas parcelas do consignado."
    servidores: "Olá! Sou servidor(a) público(a), me chamo {{nome}}. Tenho interesse em reduzir minhas parcelas do consignado."
  variables: ["nome"]
  note: "Wolfgang Tracking intercepta o location.assign() e envia dados ao backend automaticamente. O número de WhatsApp e o redirect são gerenciados pelo Wolfgang — não incluir número nos configs."
