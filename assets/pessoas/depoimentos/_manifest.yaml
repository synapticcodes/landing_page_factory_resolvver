# ────────────────────────────────────────────────────────────
# INSTRUÇÕES PARA O AGENTE
# ────────────────────────────────────────────────────────────
instrucoes_agente:

  selecao:
    quantidade_por_pagina: 3
    algoritmo:
      - "1. Identificar audiência da página (aposentados OU servidores)"
      - "2. Obter cidade + UF do visitante via IPData"
      - "3. Mapear UF → região (usar mapa 'regioes')"
      - "4. Filtrar depoimentos da REGIÃO correspondente"
      - "5. Filtrar apenas onde aprovado: true E texto não vazio"
      - "6. Ordenar aplicando ALTERNÂNCIA DE GÊNERO: M, F, M, F..."
      - "7. Selecionar os primeiros 3 (ou 4 se a página usar 4)"
      - "8. SUBSTITUIR localidade: exibir CIDADE + UF do visitante no card"

    alternancia_genero:
      regra: "Sequência obrigatória M → F → M → F"
      implementacao: |
        const selecionados = [];
        let proximoGenero = 'M'; // sempre começa com M
        const pool = depoimentosRegiao.filter(d => d.aprovado && d.texto);

        while (selecionados.length < quantidade) {
          const candidato = pool.find(d => d.genero === proximoGenero && !selecionados.includes(d));
          if (candidato) {
            selecionados.push(candidato);
            proximoGenero = proximoGenero === 'M' ? 'F' : 'M';
          } else {
            // Se não tem do gênero esperado, pega o que tiver
            const qualquer = pool.find(d => !selecionados.includes(d));
            if (qualquer) selecionados.push(qualquer);
            else break;
          }
        }

    substituicao_localidade:
      descricao: |
        O card do depoimento NUNCA mostra a região/cidade real da foto.
        Sempre mostra a cidade + UF do visitante (via IPData).
      exemplo_codigo: |
        // IPData retorna:
        // { city: "Londrina", region_code: "PR" }

        // Card renderiza:
        // foto: neuza_aparecida_sul_aposentada.jpg
        // nome: "Neuza Aparecida"
        // local: "Londrina, PR"  ← cidade do VISITANTE
        // texto: "Pagava R$ 650, agora pago R$ 420..."

  fallback:
    sem_fotos_na_regiao:
      - "1. Tentar região vizinha: sudeste↔sul, nordeste↔norte, centro_oeste→qualquer"
      - "2. Se nenhuma região tem fotos aprovadas → usar avatar CSS com iniciais"
    sem_ipdata:
      - "Se IPData falhar → mostrar depoimentos com maiores economia_mensal"
      - "Localidade exibida: omitir cidade, mostrar apenas estado genérico ou nada"

  validacao:
    - "Não exibir depoimentos com aprovado: false"
    - "Não exibir depoimentos com texto vazio"
    - "Verificar que alternância M/F está sendo respeitada"
    - "Verificar que localidade exibida = cidade do visitante (não da foto)"
    - "Alertar se região inteira não tem nenhum depoimento aprovado"

