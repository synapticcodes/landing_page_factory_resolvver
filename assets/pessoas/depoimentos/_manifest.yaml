# ============================================================
# MANIFESTO DE DEPOIMENTOS — Resolvver Landing Page Factory
# ============================================================
# Este arquivo mapeia cada foto a uma pessoa, região, gênero
# e dados do depoimento. O agente usa este manifesto + IPData
# para exibir depoimentos DINAMIZADOS para a cidade do visitante.
#
# ─── LÓGICA PRINCIPAL ──────────────────────────────────────
# 1. Fotos são por REGIÃO (não por UF/cidade)
# 2. O texto do depoimento mostra a CIDADE DO VISITANTE
#    (obtida via IPData), NÃO a cidade real da foto
# 3. Gênero OBRIGATORIAMENTE alternado: M, F, M, F...
#    - 4 depoimentos → 2M + 2F
#    - 3 depoimentos → 2M + 1F ou 1M + 2F (alternar por página)
# 4. Seleção: filtrar por audiência → região do visitante → alternar gênero
# ============================================================

versao: "2.0"
atualizado_em: "2026-03-03"

# ────────────────────────────────────────────────────────────
# REGIÕES — mapeamento UF → região
# ────────────────────────────────────────────────────────────
regioes:
  sudeste: [SP, RJ, MG, ES]
  nordeste: [BA, CE, PE, MA, PB, PI, RN, SE, AL]
  sul: [PR, SC, RS]
  centro_oeste: [DF, GO, MT, MS, TO]
  norte: [PA, AM, RO, AC, AP, RR]

# ────────────────────────────────────────────────────────────
# REGRAS DE DINAMIZAÇÃO
# ────────────────────────────────────────────────────────────
dinamizacao:
  descricao: |
    Cada depoimento exibido mostra a CIDADE DO VISITANTE como
    localidade, não a cidade original da pessoa na foto.
    Isso cria identificação imediata: "alguém da minha cidade".

  fluxo:
    - "1. IPData retorna: { city, region_code (UF) }"
    - "2. Mapear UF → região (usar mapa 'regioes' acima)"
    - "3. Filtrar depoimentos da AUDIÊNCIA correta (aposentados OU servidores)"
    - "4. Filtrar depoimentos da REGIÃO do visitante"
    - "5. Aplicar ALTERNÂNCIA DE GÊNERO (M, F, M, F)"
    - "6. Selecionar 3-4 depoimentos"
    - "7. Substituir cidade/UF no card pelo dados do IPData"

  substituicao:
    campo_original: "regiao (ex: sudeste)"
    campo_exibido: "cidade + UF do visitante (ex: 'Londrina, PR')"
    exemplo: |
      Foto: celia_aparecida_sudeste_aposentada.jpg
      Visitante de Londrina/PR (região Sul? NÃO — a foto é do Sudeste)

      CORREÇÃO: O visitante de Londrina/PR está na região SUL.
      Então o sistema puxa fotos da pasta SUL:
        → neuza_aparecida_sul_aposentada.jpg (F)
        → ignacio_gomes_sul_aposentado.jpg (M)
        → vania_da_silva_sul_aposentada.jpg (F)

      E exibe TODAS como "Londrina, PR" no card.

  fallback:
    - "Se a região do visitante não tem fotos suficientes → puxar de região vizinha"
    - "Vizinhança: sudeste↔sul, nordeste↔norte, centro_oeste→qualquer"
    - "Último fallback: usar fotos de qualquer região + avatar CSS"

# ────────────────────────────────────────────────────────────
# REGRAS DE GÊNERO
# ────────────────────────────────────────────────────────────
genero:
  regra: "Alternância obrigatória M/F"
  exemplos:
    4_depoimentos: ["M", "F", "M", "F"]
    3_depoimentos_v1: ["M", "F", "M"]
    3_depoimentos_v2: ["F", "M", "F"]
  nota: "Alternar qual versão (v1 ou v2) é usada entre páginas diferentes"

